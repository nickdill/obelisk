version: "0.1"
name: "obelisk"
type: server
domains:
  local: obelisk.localhost
modules:
  agent:
    image: ghcr.io/nickdill/obelisk-agent
    git_source: ../obelisk-agent
    domains:
      local: agent.localhost
  dev:
    image: ghcr.io/nickdill/obelisk-dev
    git_source: ../obelisk-dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OBELISK_DOCKER_NETWORK: obelisk_obelisk
    domains:
      local: dev.localhost
