<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Megalisk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      max-width: 480px;
      width: 100%;
      padding: 2.5rem;
      border: 1px solid #2d3748;
      border-radius: 12px;
      background: #1a202c;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #68d391;
      margin-bottom: 1.5rem;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #68d391;
      box-shadow: 0 0 0 2px rgba(104, 211, 145, 0.25);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f7fafc;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #718096;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .divider {
      border: none;
      border-top: 1px solid #2d3748;
      margin-bottom: 1.5rem;
    }

    .hint {
      font-size: 0.85rem;
      color: #718096;
      line-height: 1.6;
    }

    code {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.8rem;
      background: #2d3748;
      color: #a0aec0;
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status">nginx running</div>
    <h1>Megalisk</h1>
    <p class="subtitle">Your server is reachable. No modules are connected to this domain yet.</p>
    <hr class="divider">
    <p class="hint">
      Add a module to <code>megalisk.yml</code> and re-run <code>.megalisk/run.sh</code> to route traffic to your services.
    </p>
  </div>
</body>
</html>
