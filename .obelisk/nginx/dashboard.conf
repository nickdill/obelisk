server {
    listen 80;
    server_name dashboard.localhost;

    root /obelisk/static/dashboard/dist/;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
